{% extends "base.html" %}



{% block content %}
{% if not request.user.is_authenticated %}
<div>
    <form method="POST" style="margin: 10px;">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
      </div>

    </form>
    <p>Already have account? Please <a href="/login/" >login</a></p>
    <p>Need an account? Please <a href="/register/">Register</p>

</div>
{% else %}
  <p>You're already logged in, would you like to logout? <a href='/logout/'>Logout</a>
  </p>
{% endif %}




{% endblock %}
